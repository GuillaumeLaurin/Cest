name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build and run the self-test on every supported platform + compiler.
  # The hotpatch module is compiled out everywhere (it is not part of the CI
  # surface yet), so Windows/MSVC can build the rest of the library without
  # needing hotpatch support.
  # ---------------------------------------------------------------------------
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — GCC and Clang, Debug and Release.
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Debug
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Release
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
            build_type: Debug

          # macOS — Apple Clang, both Intel and Apple Silicon runners.
          - os: macos-13          # Intel
            compiler: appleclang
            cc: clang
            cxx: clang++
            build_type: Debug
          - os: macos-latest      # Apple Silicon (arm64)
            compiler: appleclang
            cc: clang
            cxx: clang++
            build_type: Debug

          # Windows — MSVC, Debug and Release.
          - os: windows-latest
            compiler: msvc
            build_type: Debug
          - os: windows-latest
            compiler: msvc
            build_type: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up compiler (POSIX)
        if: runner.os != 'Windows'
        run: |
          echo "CC=${{ matrix.cc }}"   >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCEST_BUILD_EXAMPLE=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Run self-test (POSIX)
        if: runner.os != 'Windows'
        run: ./build/example
        env:
          NO_COLOR: "1"

      - name: Run self-test (Windows)
        if: runner.os == 'Windows'
        run: .\build\${{ matrix.build_type }}\example.exe
        env:
          NO_COLOR: "1"

  # ---------------------------------------------------------------------------
  # Strict warnings: build once with -Wall -Wextra -Wpedantic -Werror to catch
  # anything the permissive matrix lets through. GCC on Linux — MSVC has its
  # own warning set and is checked by the main build-and-test matrix.
  # ---------------------------------------------------------------------------
  strict-warnings:
    name: Strict warnings (GCC -Werror)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure with strict flags
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCEST_BUILD_EXAMPLE=ON
          -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Werror -Wshadow -Wnon-virtual-dtor"

      - name: Build
        run: cmake --build build --parallel

      - name: Run
        run: ./build/example
        env:
          NO_COLOR: "1"

  # ---------------------------------------------------------------------------
  # Sanitizers: catch memory errors, UB, and data races that the regular build
  # won't flag. Clang on Linux is the cheapest and most reliable combo; MSVC's
  # sanitizer story is not worth the integration pain for this project.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: Sanitizers (${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined, thread]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCEST_BUILD_EXAMPLE=ON
          -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=${{ matrix.sanitizer }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Run
        run: ./build/example
        env:
          NO_COLOR: "1"
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1:abort_on_error=1"
          UBSAN_OPTIONS: "halt_on_error=1:abort_on_error=1:print_stacktrace=1"
          TSAN_OPTIONS: "halt_on_error=1"