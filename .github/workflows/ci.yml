name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build and run the self-test on every supported platform + compiler.
  # ---------------------------------------------------------------------------
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Debug
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
            build_type: Release
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
            build_type: Debug

          - os: macos-latest
            compiler: appleclang
            cc: clang
            cxx: clang++
            build_type: Debug

          - os: windows-latest
            compiler: msvc
            build_type: Debug
          - os: windows-latest
            compiler: msvc
            build_type: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up compiler (POSIX)
        if: runner.os != 'Windows'
        run: |
          echo "CC=${{ matrix.cc }}"   >> $GITHUB_ENV
          echo "CXX=${{ matrix.cxx }}" >> $GITHUB_ENV

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCEST_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Run self-test (POSIX)
        if: runner.os != 'Windows'
        run: ./build/cest_example
        env:
          NO_COLOR: "1"

      - name: Run self-test (Windows)
        if: runner.os == 'Windows'
        run: .\build\${{ matrix.build_type }}\cest_example.exe
        env:
          NO_COLOR: "1"

  # ---------------------------------------------------------------------------
  # Strict warnings — GCC/Linux only.
  # ---------------------------------------------------------------------------
  strict-warnings:
    name: Strict warnings (GCC -Werror)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure with strict flags
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCEST_BUILD_EXAMPLES=ON
          -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Werror -Wshadow -Wnon-virtual-dtor"

      - name: Build
        run: cmake --build build --parallel

      - name: Run
        run: ./build/cest_example
        env:
          NO_COLOR: "1"

  # ---------------------------------------------------------------------------
  # Sanitizers — Clang/Linux.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: Sanitizers (${{ matrix.sanitizer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined, thread]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCEST_BUILD_EXAMPLES=ON
          -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=${{ matrix.sanitizer }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Run
        run: ./build/cest_example
        env:
          NO_COLOR: "1"
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1:abort_on_error=1"
          UBSAN_OPTIONS: "halt_on_error=1:abort_on_error=1:print_stacktrace=1"
          TSAN_OPTIONS: "halt_on_error=1"